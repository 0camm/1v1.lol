<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildNow GG</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    .page {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100vh;
    }

    .game-area {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #000;
    }

    .game-area iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .footer {
      flex: 0 0 auto;
      background: #111;
      color: #fff;
      padding: 12px 16px;
      box-sizing: border-box;
      z-index: 1;
    }

    .footer button {
      margin-right: 8px;
      padding: 8px 12px;
      border: 0;
      border-radius: 6px;
      background: #2a2a2a;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="game-area">
      <iframe
        id="game-iframe"
        src="https://buildnow-gg.game-files.crazygames.com/unity/unity2020/buildnow-gg.html?isNewUser=false&v=1.352"
        allow="accelerometer; gyroscope; gamepad; autoplay; payment; fullscreen; microphone; clipboard-read; clipboard-write"
        allowfullscreen
      ></iframe>
    </div>

    <div class="footer">
      <button>Invite friends</button>
      <button>Like</button>
      <button>Dislike</button>
      <button>Favorite</button>
      <button>Mute</button>
      <button>Fullscreen</button>
    </div>
  </div>
</body>
</html>
